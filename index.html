<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>SyncMeet</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23ffdf00'/><rect x='20' y='20' width='60' height='60' fill='none' stroke='black' stroke-width='12'/><path d='M45 35 L45 65 L65 50 Z' fill='black'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --neo-bg: #ffffff;
        --neo-accent: #ffdf00; /* Vibrant Yellow */
        --neo-border: #000000;
        --neo-shadow: #000000;
      }

      body {
        font-family: 'Space Grotesk', sans-serif;
        background-color: var(--neo-bg);
        color: #000;
        overflow: hidden;
        overscroll-behavior: none;
      }
      
      .brut-border {
        border: 4px solid var(--neo-border);
        box-shadow: 4px 4px 0px 0px var(--neo-shadow);
      }

      .brut-border-lg {
        border: 6px solid var(--neo-border);
        box-shadow: 8px 8px 0px 0px var(--neo-shadow);
      }

      .brut-btn {
        background-color: var(--neo-accent);
        border: 4px solid var(--neo-border);
        box-shadow: 4px 4px 0px 0px var(--neo-shadow);
        transition: all 0.1s;
        font-weight: 700;
        text-transform: uppercase;
        cursor: pointer;
      }

      .brut-btn:active {
        box-shadow: 0px 0px 0px 0px var(--neo-shadow);
        transform: translate(4px, 4px);
      }

      .brut-input {
        background-color: #fff;
        border: 4px solid var(--neo-border);
        padding: 1rem;
        font-family: 'JetBrains Mono', monospace;
        outline: none;
      }

      .brut-tile {
        background-color: #fff;
        border: 4px solid var(--neo-border);
        box-shadow: 8px 8px 0px 0px var(--neo-shadow);
      }

      /* Floating Emoji Animation for Brutalism */
      @keyframes float-up {
        0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
        10% { opacity: 1; }
        100% { transform: translateY(-200px) scale(2) rotate(20deg); opacity: 0; }
      }
      .animate-float-up {
        animation: float-up 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }

      @keyframes infinite-scroll {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
      }
      .animate-infinite-scroll {
        display: inline-flex;
        animation: infinite-scroll 10s linear infinite;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }
      ::-webkit-scrollbar-track {
        background: #fff;
        border-left: 4px solid #000;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--neo-accent);
        border: 4px solid #000;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #fff;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
  <script type="importmap">
{

}

</head>
